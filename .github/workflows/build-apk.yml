name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Package OTA Update
        run: |
          cd www
          zip -r ../update.zip .
          cd ..
          node -e "const pkg = require('./package.json'); require('fs').writeFileSync('version.json', JSON.stringify({ version: pkg.version }));"
          mkdir -p ota_dist
          mv update.zip ota_dist/
          mv version.json ota_dist/

      - name: Deploy OTA to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ota_dist

      - name: Add Android Platform
        run: |
          # Only add if android folder does not exist
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Fix Android Compile SDK Version
        run: |
          # The capgo updater depends on androidx.work:work-runtime:2.10.5
          # which requires compileSdkVersion 35
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' android/variables.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/QuickFindPass.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickFind-APK
          path: android/app/build/outputs/apk/debug/QuickFindPass.apk
